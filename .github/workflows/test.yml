permissions:
  contents: read

name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
  schedule:
    # Weekly full network + source health (UTC Sunday midnight)
    - cron: "0 0 * * 0"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HOSTY_CI_LOG_DIR: ${{ github.workspace }}/ci-logs

jobs:
  lint:
    name: Lint (shfmt + shellcheck)
    runs-on: ubuntu-26.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt

      - name: shfmt (check only)
        run: shfmt -i 4 -ci -sr -d hosty.sh install.sh ci/*.sh

      - name: shellcheck
        run: shellcheck hosty.sh install.sh ci/lib.sh ci/smoke.sh ci/check-sources.sh

      - name: POSIX syntax (dash -n)
        run: |
          sudo apt-get install -y dash
          dash -n hosty.sh install.sh ci/smoke.sh ci/check-sources.sh ci/lib.sh

  smoke:
    name: Smoke (${{ matrix.name }})
    needs: lint
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu
            runner: ubuntu-26.04
          - name: macos
            runner: macos-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y expect dash cron

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install expect

      - name: Run offline smoke suite
        run: |
          chmod +x hosty.sh install.sh ci/smoke.sh ci/check-sources.sh ci/expect/*.exp
          ./ci/smoke.sh

      - name: Upload CI logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-logs-${{ matrix.name }}
          path: ci-logs/
          if-no-files-found: ignore

  smoke-alpine:
    name: Smoke (alpine)
    needs: lint
    runs-on: ubuntu-26.04
    timeout-minutes: 20
    container: alpine:latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install dependencies
        run: apk add --no-cache curl bash expect cronie coreutils

      - name: Run offline smoke suite
        run: |
          chmod +x hosty.sh install.sh ci/smoke.sh ci/check-sources.sh ci/expect/*.exp
          # Alpine image runs as root; provide dash via busybox ash symlink check
          if ! command -v dash >/dev/null 2>&1; then
            ln -sf /bin/sh /usr/local/bin/dash 2>/dev/null || true
          fi
          ./ci/smoke.sh

      - name: Upload CI logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-logs-alpine
          path: ci-logs/
          if-no-files-found: ignore

  network:
    name: Network full run
    needs: lint
    # Full remote source downloads: main pushes, weekly schedule, manual runs
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-26.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y expect dash cron

      - name: Run smoke with network + production install
        env:
          RUN_NETWORK: "1"
          RUN_PRODUCTION_INSTALL: "1"
        run: |
          chmod +x hosty.sh install.sh ci/smoke.sh ci/expect/*.exp
          ./ci/smoke.sh

      - name: Upload CI logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-logs-network
          path: ci-logs/
          if-no-files-found: ignore

  source-health:
    name: Source URL health
    needs: lint
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-26.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check source URLs
        run: |
          chmod +x ci/check-sources.sh
          ./ci/check-sources.sh

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: source-health-report
          path: ci-logs/
          if-no-files-found: ignore
