permissions:
  contents: read

name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
  schedule:
    # Weekly full network + source health (UTC Sunday midnight)
    - cron: "0 0 * * 0"
  workflow_dispatch:

# Cancel superseded PR/push runs, but never cancel scheduled health checks.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

env:
  HOSTY_CI_LOG_DIR: ${{ github.workspace }}/ci-logs

jobs:
  lint:
    name: Lint (POSIX sh)
    runs-on: ubuntu-26.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install tools
        run: |
          sudo apt -qq update
          sudo DEBIAN_FRONTEND=noninteractive apt -qq -o Dpkg::Use-Pty=0 install -y \
            shellcheck shfmt dash

      - name: Format
        run: |
          shfmt -i 4 -ci -sr -w hosty.sh install.sh ci/*.sh
          git diff --exit-code

      - name: Upload formatted scripts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: shfmt-output
          path: |
            hosty.sh
            install.sh
            ci/*.sh
          if-no-files-found: error

      - name: ShellCheck (POSIX sh)
        run: shellcheck --shell=sh hosty.sh install.sh ci/lib.sh ci/smoke.sh ci/check-sources.sh

      - name: dash syntax and runtime
        run: |
          dash -n hosty.sh install.sh ci/lib.sh ci/smoke.sh ci/check-sources.sh
          dash hosty.sh --help >/dev/null
          dash hosty.sh --version >/dev/null

  smoke:
    name: Smoke (${{ matrix.name }})
    needs: lint
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu
            runner: ubuntu-26.04
          - name: macos
            runner: macos-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt -qq update
          sudo DEBIAN_FRONTEND=noninteractive apt -qq -o Dpkg::Use-Pty=0 install -y \
            expect dash cron

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install expect

      - name: Run offline smoke suite
        run: |
          chmod +x hosty.sh install.sh ci/smoke.sh ci/check-sources.sh ci/expect/*.exp
          ./ci/smoke.sh

      - name: Upload CI logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-logs-${{ matrix.name }}
          path: ci-logs/
          if-no-files-found: ignore

  smoke-alpine:
    name: Smoke (Alpine / BusyBox ash)
    needs: lint
    runs-on: ubuntu-26.04
    timeout-minutes: 20
    container: alpine:latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install dependencies
        run: apk add --no-cache curl expect cronie coreutils dash

      - name: Run offline smoke suite
        run: |
          chmod +x hosty.sh install.sh ci/smoke.sh ci/check-sources.sh ci/expect/*.exp
          ./ci/smoke.sh

      - name: Upload CI logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-logs-alpine
          path: ci-logs/
          if-no-files-found: ignore

  smoke-openbsd:
    name: Smoke (OpenBSD 7.9)
    needs: lint
    runs-on: ubuntu-26.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run offline smoke suite in OpenBSD
        uses: vmactions/openbsd-vm@6fac4962055fe9952d29930942445739e509fecd # v1.4.2
        with:
          release: "7.9"
          usesh: true
          prepare: |
            pkg_add curl expect
            useradd -m hostyci
            printf '%s\n' \
              'permit nopass root as hostyci' \
              'permit nopass hostyci as root' > /etc/doas.conf
          run: |
            chmod +x hosty.sh install.sh ci/smoke.sh ci/check-sources.sh ci/expect/*.exp
            ./ci/smoke.sh

            cp hosty.sh install.sh /tmp/
            chmod 755 /tmp/hosty.sh /tmp/install.sh
            doas -u hostyci env HOSTY_URL=/tmp/hosty.sh sh /tmp/install.sh </dev/null
            test "$(/usr/local/bin/hosty -v)" = "$(./hosty.sh -v)"
            rm -f /usr/local/bin/hosty /tmp/hosty.sh /tmp/install.sh

  smoke-freebsd:
    name: Smoke (FreeBSD 15.0)
    needs: lint
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-26.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run offline smoke suite in FreeBSD
        uses: vmactions/freebsd-vm@670398e4236735b8b65805c3da44b7a511fb8b27 # v1.3.0
        with:
          release: "15.0"
          usesh: true
          prepare: pkg install -y curl expect
          run: |
            chmod +x hosty.sh install.sh ci/smoke.sh ci/check-sources.sh ci/expect/*.exp
            ./ci/smoke.sh

  network:
    name: Network full run
    needs: lint
    # Full remote source downloads: main pushes, weekly schedule, manual runs
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-26.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install dependencies
        run: |
          sudo apt -qq update
          sudo DEBIAN_FRONTEND=noninteractive apt -qq -o Dpkg::Use-Pty=0 install -y \
            expect dash cron

      - name: Run smoke with network + production install
        env:
          RUN_NETWORK: "1"
          RUN_PRODUCTION_INSTALL: "1"
        run: |
          chmod +x hosty.sh install.sh ci/smoke.sh ci/expect/*.exp
          ./ci/smoke.sh

      - name: Upload CI logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-logs-network
          path: ci-logs/
          if-no-files-found: ignore

  source-health:
    name: Source URL health
    needs: lint
    if: >
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-26.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check source URLs
        run: |
          chmod +x ci/check-sources.sh
          ./ci/check-sources.sh

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: source-health-report
          path: ci-logs/
          if-no-files-found: ignore
